# Ephemeral infrastructure for load-test runs.
# It is intentionally a separate Compose project because it uses the same host
# ports as the normal local stack and must never be started alongside it.
name: chatagent-loadtest

services:
  postgres:
    image: postgres:16-alpine
    container_name: chatagent-loadtest-postgres
    environment:
      POSTGRES_DB: chatagent
      POSTGRES_USER: app
      POSTGRES_PASSWORD: "${CHATAGENT_DB_PASSWORD:?CHATAGENT_DB_PASSWORD is required}"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d chatagent"]
      interval: 3s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: chatagent-loadtest-redis
    environment:
      REDIS_PASSWORD: "${CHATAGENT_REDIS_PASSWORD:?CHATAGENT_REDIS_PASSWORD is required}"
    command: ["sh", "-c", "exec redis-server --requirepass \"$${REDIS_PASSWORD}\""]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: chatagent-loadtest-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: "${CHATAGENT_RABBITMQ_PASSWORD:?CHATAGENT_RABBITMQ_PASSWORD is required}"
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
