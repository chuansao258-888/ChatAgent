services:
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: chatagent-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./docs/observability/prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
      - ./docs/observability/chat-routing-alerts.prometheus.yml:/etc/prometheus/rules/chat-routing-alerts.prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.3.0
    container_name: chatagent-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${CHATAGENT_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${CHATAGENT_GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./docs/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docs/observability/chat-routing-grafana-dashboard.json:/var/lib/grafana/dashboards/chat-routing-grafana-dashboard.json:ro
    depends_on:
      - prometheus
