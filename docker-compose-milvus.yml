# Local Milvus standalone stack for ChatAgent — UNTRACKED, do not commit.
# Uses Docker named volumes (data lives in Docker's WSL2 disk), so it is immune
# to host-path deletion and the OneDrive/CJK bind-mount quirks that previously
# caused the "mkdir data: file exists" failure. Same pattern as the
# postgres/redis/rabbitmq volumes in the root docker-compose.yml.
# Starts EMPTY — re-ingest the knowledge base after first boot.
#
#   docker compose -f docker-compose-milvus.yml up -d
#   docker compose -f docker-compose-milvus.yml down        # stop (keeps volumes)
#   docker compose -f docker-compose-milvus.yml down -v     # stop + DELETE data volumes

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.25
    container_name: chatagent-milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - chatagent-milvus-etcd-data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: chatagent-milvus-minio
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    volumes:
      - chatagent-milvus-minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"

  milvus:
    image: milvusdb/milvus:v2.6.11
    container_name: chatagent-milvus
    command: milvus run standalone
    environment:
      - MQ_TYPE=woodpecker
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    volumes:
      - chatagent-milvus-data:/var/lib/milvus
    ports:
      - "19530:19530"   # gRPC — backend connects here (application.yaml: milvus.host=localhost, port=19530)
      - "9091:9091"     # metrics
    depends_on:
      - etcd
      - minio

volumes:
  chatagent-milvus-etcd-data:
  chatagent-milvus-minio-data:
  chatagent-milvus-data:
