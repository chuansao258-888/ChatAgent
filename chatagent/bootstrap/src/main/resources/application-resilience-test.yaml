spring: # Groups spring configuration.
  ai: # Groups ai configuration.
    anthropic: # Groups anthropic configuration.
      api-key: REDACTED_API_KEY # Sets api key for ai anthropic.
      base-url: http://127.0.0.1:8890 # Sets the service endpoint for ai anthropic.
    deepseek: # Groups deepseek configuration.
      api-key: REDACTED_API_KEY # Sets api key for ai deepseek.
      base-url: http://127.0.0.1:8890 # Sets the service endpoint for ai deepseek.
    zhipuai: # Groups zhipuai configuration.
      api-key: REDACTED_API_KEY # Sets api key for ai zhipuai.
      base-url: http://127.0.0.1:8890 # Sets the service endpoint for ai zhipuai.

chat: # Groups chat configuration.
  routing: # Groups routing configuration.
    first-packet-timeout-seconds: 2 # Sets the first packet timeout in seconds for chat routing.
    health: # Groups health configuration.
      half-open-flight-timeout-ms: 5000 # Sets the half open flight timeout in milliseconds for routing health.

chatagent: # Groups chatagent configuration.
  memory: # Groups memory configuration.
    l3: # Groups l3 configuration.
      enabled: false # Controls whether memory l3 is enabled.
