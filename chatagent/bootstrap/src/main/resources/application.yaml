spring:
  application:
    name: chatagent
  data:
    redis:
      host: ${CHATAGENT_REDIS_HOST:localhost}
      port: ${CHATAGENT_REDIS_PORT:6379}
      password: ${CHATAGENT_REDIS_PASSWORD:}
      database: ${CHATAGENT_REDIS_DATABASE:0}

  datasource:
    url: ${CHATAGENT_DB_URL:jdbc:postgresql://localhost:5432/chatagent}
    username: ${CHATAGENT_DB_USERNAME:app}
    password: ${CHATAGENT_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
  mail:
    host: ${CHATAGENT_MAIL_HOST:smtp.qq.com}
    port: ${CHATAGENT_MAIL_PORT:587}
    username: ${CHATAGENT_MAIL_USERNAME:}
    password: ${CHATAGENT_MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${CHATAGENT_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${CHATAGENT_MAIL_STARTTLS_ENABLE:true}
            required: ${CHATAGENT_MAIL_STARTTLS_REQUIRED:true}
  ai:
    deepseek:
      api-key: ${CHATAGENT_DEEPSEEK_API_KEY:}
      base-url: ${CHATAGENT_DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${CHATAGENT_DEEPSEEK_MODEL:deepseek-chat}
    zhipuai:
      api-key: ${CHATAGENT_ZHIPUAI_API_KEY:}
      base-url: ${CHATAGENT_ZHIPUAI_BASE_URL:https://open.bigmodel.cn/api/paas}
      chat:
        options:
          model: ${CHATAGENT_ZHIPUAI_MODEL:glm-4.6}

mybatis:
  type-aliases-package: com.yulong.chatagent.support.persistence.entity
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.yulong.chatagent.support.persistence.typehandler

document:
  storage:
    base-path: ./data/documents

rag:
  embedding:
    base-url: ${CHATAGENT_RAG_EMBEDDING_BASE_URL:http://localhost:11434}
    model: ${CHATAGENT_RAG_EMBEDDING_MODEL:bge-m3}
  retrieval:
    top-k: ${CHATAGENT_RAG_TOP_K:3}
    candidate-k: ${CHATAGENT_RAG_CANDIDATE_K:12}
    rrf-k: ${CHATAGENT_RAG_RRF_K:60}
    reranker:
      provider: ${CHATAGENT_RAG_RERANKER_PROVIDER:bge-http}
      model-id: ${CHATAGENT_RAG_RERANKER_MODEL:BAAI/bge-reranker-v2-m3}
      max-candidates: ${CHATAGENT_RAG_RERANKER_MAX_CANDIDATES:8}
      max-chunk-chars: ${CHATAGENT_RAG_RERANKER_MAX_CHUNK_CHARS:900}
      max-connections: ${CHATAGENT_RAG_RERANKER_MAX_CONNECTIONS:10}
      base-url: ${CHATAGENT_RAG_RERANKER_BASE_URL:http://localhost:7997}
      path: ${CHATAGENT_RAG_RERANKER_PATH:/rerank}
      ready-path: ${CHATAGENT_RAG_RERANKER_READY_PATH:/ready}
      api-key: ${CHATAGENT_RAG_RERANKER_API_KEY:}
      connect-timeout-ms: ${CHATAGENT_RAG_RERANKER_CONNECT_TIMEOUT_MS:300}
      response-timeout-ms: ${CHATAGENT_RAG_RERANKER_RESPONSE_TIMEOUT_MS:1800}
      read-timeout-ms: ${CHATAGENT_RAG_RERANKER_READ_TIMEOUT_MS:1800}
      write-timeout-ms: ${CHATAGENT_RAG_RERANKER_WRITE_TIMEOUT_MS:1000}
      pending-acquire-timeout-ms: ${CHATAGENT_RAG_RERANKER_PENDING_ACQUIRE_TIMEOUT_MS:200}
      ready-probe-timeout-ms: ${CHATAGENT_RAG_RERANKER_READY_PROBE_TIMEOUT_MS:200}
      retry-connect-errors: ${CHATAGENT_RAG_RERANKER_RETRY_CONNECT_ERRORS:1}
      enable-confidence-filter: ${CHATAGENT_RAG_RERANKER_FILTER_ENABLED:true}
      score-threshold: ${CHATAGENT_RAG_RERANKER_SCORE_THRESHOLD:0.15}
      failure-threshold: ${CHATAGENT_RAG_RERANKER_FAILURE_THRESHOLD:5}
      failure-rate-threshold-percent: ${CHATAGENT_RAG_RERANKER_FAILURE_RATE_THRESHOLD_PERCENT:50}
      minimum-request-volume: ${CHATAGENT_RAG_RERANKER_MIN_REQUEST_VOLUME:10}
      open-state-ms: ${CHATAGENT_RAG_RERANKER_OPEN_STATE_MS:30000}
      half-open-probe-count: ${CHATAGENT_RAG_RERANKER_HALF_OPEN_PROBE_COUNT:1}
  vector-store:
    provider: ${CHATAGENT_RAG_VECTOR_STORE_PROVIDER:milvus}

milvus:
  enabled: ${CHATAGENT_MILVUS_ENABLED:false}
  bm25-enabled: ${CHATAGENT_MILVUS_BM25_ENABLED:false}
  host: ${CHATAGENT_MILVUS_HOST:localhost}
  port: ${CHATAGENT_MILVUS_PORT:19530}
  database: ${CHATAGENT_MILVUS_DATABASE:default}
  collection: ${CHATAGENT_MILVUS_COLLECTION:chat_file_chunk}
  username: ${CHATAGENT_MILVUS_USERNAME:}
  password: ${CHATAGENT_MILVUS_PASSWORD:}
  metric-type: ${CHATAGENT_MILVUS_METRIC_TYPE:COSINE}
  index-type: ${CHATAGENT_MILVUS_INDEX_TYPE:AUTOINDEX}
  consistency-level: ${CHATAGENT_MILVUS_CONSISTENCY_LEVEL:BOUNDED}
  dimension: ${CHATAGENT_MILVUS_DIMENSION:1024}
  knowledge-base:
    collection: ${CHATAGENT_MILVUS_KNOWLEDGE_BASE_COLLECTION:chat_knowledge_chunk}

chat:
  routing:
    default-model: ${CHATAGENT_DEFAULT_CHAT_MODEL:deepseek-chat}

chatagent:
  intent:
    minimum-score: 0.45
    ambiguity-gap: 0.2
    clarification-candidates: 2
    classifier-model: ${CHATAGENT_INTENT_CLASSIFIER_MODEL:deepseek-chat}
    rewrite-model: ${CHATAGENT_INTENT_REWRITE_MODEL:deepseek-chat}
  memory:
    l1-window-turns: ${CHATAGENT_MEMORY_L1_WINDOW_TURNS:8}
    l1-token-budget: ${CHATAGENT_MEMORY_L1_TOKEN_BUDGET:4000}
    summary-model: ${CHATAGENT_MEMORY_SUMMARY_MODEL:deepseek-chat}
    summary-max-chars: ${CHATAGENT_MEMORY_SUMMARY_MAX_CHARS:500}
  rag:
    ingestion:
      contextual-enricher:
        enabled: ${CHATAGENT_RAG_CONTEXTUAL_ENRICHER_ENABLED:true}
        model-id: ${CHATAGENT_RAG_CONTEXTUAL_MODEL:}
        max-document-chars: ${CHATAGENT_RAG_CONTEXTUAL_MAX_DOCUMENT_CHARS:12000}
        max-chunks-per-file: ${CHATAGENT_RAG_CONTEXTUAL_MAX_CHUNKS_PER_FILE:12}
        min-chunk-chars: ${CHATAGENT_RAG_CONTEXTUAL_MIN_CHUNK_CHARS:160}
        max-context-chars: ${CHATAGENT_RAG_CONTEXTUAL_MAX_CONTEXT_CHARS:600}

auth:
  jwt:
    issuer: ${CHATAGENT_JWT_ISSUER:chatagent}
    secret: ${CHATAGENT_JWT_SECRET:change-this-to-a-long-random-secret-key-change-this}
    access-ttl-minutes: ${CHATAGENT_JWT_ACCESS_TTL_MINUTES:30}
    refresh-ttl-days: ${CHATAGENT_JWT_REFRESH_TTL_DAYS:7}

logging:
  level:
    com.yulong.chatagent.user: INFO
