spring:
  application:
    name: chatagent
  profiles:
    default: ${SPRING_PROFILES_DEFAULT:local-gpu}
  servlet:
    multipart:
      max-file-size: ${CHATAGENT_MULTIPART_MAX_FILE_SIZE:64MB}
      max-request-size: ${CHATAGENT_MULTIPART_MAX_REQUEST_SIZE:64MB}
  data:
    redis:
      host: ${CHATAGENT_REDIS_HOST:localhost}
      port: ${CHATAGENT_REDIS_PORT:6379}
      password: ${CHATAGENT_REDIS_PASSWORD:}
      database: ${CHATAGENT_REDIS_DATABASE:0}
  rabbitmq:
    host: ${CHATAGENT_RABBITMQ_HOST:localhost}
    port: ${CHATAGENT_RABBITMQ_PORT:5672}
    username: ${CHATAGENT_RABBITMQ_USERNAME:guest}
    password: ${CHATAGENT_RABBITMQ_PASSWORD:guest}
    virtual-host: ${CHATAGENT_RABBITMQ_VHOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      # Keep unroutable messages observable for the future outbox/confirm flow.
      mandatory: true
    listener:
      simple:
        default-requeue-rejected: false

  datasource:
    url: ${CHATAGENT_DB_URL:jdbc:postgresql://localhost:5432/chatagent}
    username: ${CHATAGENT_DB_USERNAME:app}
    password: ${CHATAGENT_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
  mail:
    host: ${CHATAGENT_MAIL_HOST:smtp.qq.com}
    port: ${CHATAGENT_MAIL_PORT:587}
    username: ${CHATAGENT_MAIL_USERNAME:}
    password: ${CHATAGENT_MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${CHATAGENT_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${CHATAGENT_MAIL_STARTTLS_ENABLE:true}
            required: ${CHATAGENT_MAIL_STARTTLS_REQUIRED:true}
  ai:
    deepseek:
      api-key: ${CHATAGENT_DEEPSEEK_API_KEY:}
      base-url: ${CHATAGENT_DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${CHATAGENT_DEEPSEEK_MODEL:deepseek-chat}
    zhipuai:
      api-key: ${CHATAGENT_ZHIPUAI_API_KEY:}
      base-url: ${CHATAGENT_ZHIPUAI_BASE_URL:https://open.bigmodel.cn/api/paas}
      chat:
        options:
          model: ${CHATAGENT_ZHIPUAI_MODEL:glm-4.6}

mybatis:
  type-aliases-package: com.yulong.chatagent.support.persistence.entity
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.yulong.chatagent.support.persistence.typehandler

document:
  storage:
    base-path: ./data/documents

rag:
  embedding:
    base-url: ${CHATAGENT_RAG_EMBEDDING_BASE_URL:http://127.0.0.1:11434}
    model: ${CHATAGENT_RAG_EMBEDDING_MODEL:bge-m3}
  retrieval:
    top-k: ${CHATAGENT_RAG_TOP_K:3}
    candidate-k: ${CHATAGENT_RAG_CANDIDATE_K:12}
    rrf-k: ${CHATAGENT_RAG_RRF_K:60}
    reranker:
      provider: ${CHATAGENT_RAG_RERANKER_PROVIDER:bge-http}
      model-id: ${CHATAGENT_RAG_RERANKER_MODEL:BAAI/bge-reranker-v2-m3}
      max-candidates: ${CHATAGENT_RAG_RERANKER_MAX_CANDIDATES:8}
      max-chunk-chars: ${CHATAGENT_RAG_RERANKER_MAX_CHUNK_CHARS:900}
      max-connections: ${CHATAGENT_RAG_RERANKER_MAX_CONNECTIONS:10}
      base-url: ${CHATAGENT_RAG_RERANKER_BASE_URL:http://127.0.0.1:7997}
      path: ${CHATAGENT_RAG_RERANKER_PATH:/rerank}
      ready-path: ${CHATAGENT_RAG_RERANKER_READY_PATH:/ready}
      api-key: ${CHATAGENT_RAG_RERANKER_API_KEY:}
      connect-timeout-ms: ${CHATAGENT_RAG_RERANKER_CONNECT_TIMEOUT_MS:300}
      response-timeout-ms: ${CHATAGENT_RAG_RERANKER_RESPONSE_TIMEOUT_MS:1800}
      read-timeout-ms: ${CHATAGENT_RAG_RERANKER_READ_TIMEOUT_MS:1800}
      write-timeout-ms: ${CHATAGENT_RAG_RERANKER_WRITE_TIMEOUT_MS:1000}
      pending-acquire-timeout-ms: ${CHATAGENT_RAG_RERANKER_PENDING_ACQUIRE_TIMEOUT_MS:200}
      ready-probe-timeout-ms: ${CHATAGENT_RAG_RERANKER_READY_PROBE_TIMEOUT_MS:200}
      retry-connect-errors: ${CHATAGENT_RAG_RERANKER_RETRY_CONNECT_ERRORS:1}
      enable-confidence-filter: ${CHATAGENT_RAG_RERANKER_FILTER_ENABLED:true}
      score-threshold: ${CHATAGENT_RAG_RERANKER_SCORE_THRESHOLD:0.15}
      failure-threshold: ${CHATAGENT_RAG_RERANKER_FAILURE_THRESHOLD:5}
      failure-rate-threshold-percent: ${CHATAGENT_RAG_RERANKER_FAILURE_RATE_THRESHOLD_PERCENT:50}
      minimum-request-volume: ${CHATAGENT_RAG_RERANKER_MIN_REQUEST_VOLUME:10}
      open-state-ms: ${CHATAGENT_RAG_RERANKER_OPEN_STATE_MS:30000}
      half-open-probe-count: ${CHATAGENT_RAG_RERANKER_HALF_OPEN_PROBE_COUNT:1}
  vector-store:
    provider: ${CHATAGENT_RAG_VECTOR_STORE_PROVIDER:milvus}

milvus:
  enabled: ${CHATAGENT_MILVUS_ENABLED:false}
  bm25-enabled: ${CHATAGENT_MILVUS_BM25_ENABLED:false}
  host: ${CHATAGENT_MILVUS_HOST:localhost}
  port: ${CHATAGENT_MILVUS_PORT:19530}
  database: ${CHATAGENT_MILVUS_DATABASE:default}
  collection: ${CHATAGENT_MILVUS_COLLECTION:chat_file_chunk}
  username: ${CHATAGENT_MILVUS_USERNAME:}
  password: ${CHATAGENT_MILVUS_PASSWORD:}
  metric-type: ${CHATAGENT_MILVUS_METRIC_TYPE:COSINE}
  index-type: ${CHATAGENT_MILVUS_INDEX_TYPE:AUTOINDEX}
  consistency-level: ${CHATAGENT_MILVUS_CONSISTENCY_LEVEL:BOUNDED}
  dimension: ${CHATAGENT_MILVUS_DIMENSION:1024}
  knowledge-base:
    collection: ${CHATAGENT_MILVUS_KNOWLEDGE_BASE_COLLECTION:chat_knowledge_chunk}

chat:
  routing:
    default-model: ${CHATAGENT_DEFAULT_CHAT_MODEL:deepseek-chat}
    deep-thinking-model: ${CHATAGENT_DEEP_THINKING_MODEL:glm-4}
    first-packet-timeout-seconds: 60
    stream-total-timeout-seconds: 300
    http-connect-timeout-seconds: 10
    http-read-timeout-seconds: 65
    health:
      failure-threshold: 3
      open-duration-ms: 300000
      half-open-flight-timeout-ms: 120000
    observability:
      open-circuit-warning-ratio: 0.5
      down-when-no-routable-candidates: true
      out-of-service-when-all-routable-candidates-open: true
      warn-on-orphan-overrides: true
    candidates:
      - id: deepseek-chat
        spring-client-key: deepseek-chat
        priority: 10
        enabled: true
        supports-thinking: false
      - id: glm-4
        spring-client-key: glm-4.6
        priority: 20
        enabled: true
        supports-thinking: true
        thinking-strategy: ZHIPU_THINKING_FLAG

chatagent:
  intent:
    minimum-score: 0.45
    ambiguity-gap: 0.2
    clarification-candidates: 2
    classifier-model: ${CHATAGENT_INTENT_CLASSIFIER_MODEL:deepseek-chat}
    rewrite-model: ${CHATAGENT_INTENT_REWRITE_MODEL:deepseek-chat}
  memory:
    l1-window-turns: ${CHATAGENT_MEMORY_L1_WINDOW_TURNS:8}
    l1-token-budget: ${CHATAGENT_MEMORY_L1_TOKEN_BUDGET:4000}
    summary-model: ${CHATAGENT_MEMORY_SUMMARY_MODEL:deepseek-chat}
    summary-max-chars: ${CHATAGENT_MEMORY_SUMMARY_MAX_CHARS:500}
  rag:
    vdp:
      cache:
        enabled: ${CHATAGENT_RAG_VDP_CACHE_ENABLED:true}
        session-ttl-minutes: ${CHATAGENT_RAG_VDP_CACHE_SESSION_TTL_MINUTES:30}
        session-max-size: ${CHATAGENT_RAG_VDP_CACHE_SESSION_MAX_SIZE:512}
        knowledge-ttl-minutes: ${CHATAGENT_RAG_VDP_CACHE_KNOWLEDGE_TTL_MINUTES:1440}
      routing:
        disabled-engines: []
        knowledge-batch-preferred: ${CHATAGENT_RAG_VDP_KNOWLEDGE_BATCH_PREFERRED:true}
        preferred-page-image-engine: ${CHATAGENT_RAG_VDP_PREFERRED_PAGE_IMAGE_ENGINE:}
        preferred-batch-engine: ${CHATAGENT_RAG_VDP_PREFERRED_BATCH_ENGINE:mineru}
      char-density-threshold: ${CHATAGENT_RAG_VDP_CHAR_DENSITY_THRESHOLD:150}
      short-text-fast-track-threshold: ${CHATAGENT_RAG_VDP_SHORT_TEXT_FAST_TRACK_THRESHOLD:80}
      whitespace-alignment-line-threshold: ${CHATAGENT_RAG_VDP_WHITESPACE_ALIGNMENT_LINE_THRESHOLD:2}
      pdf-page-max-in-flight: ${CHATAGENT_RAG_VDP_PDF_PAGE_MAX_IN_FLIGHT:2}
      pdf-page-timeout-ms: ${CHATAGENT_RAG_VDP_PDF_PAGE_TIMEOUT_MS:5000}
      knowledge-document-timeout-ms: ${CHATAGENT_RAG_VDP_KNOWLEDGE_DOCUMENT_TIMEOUT_MS:300000}
      pdf-page-dispatch-core-pool-size: ${CHATAGENT_RAG_VDP_PDF_PAGE_DISPATCH_CORE_POOL_SIZE:2}
      pdf-page-dispatch-max-pool-size: ${CHATAGENT_RAG_VDP_PDF_PAGE_DISPATCH_MAX_POOL_SIZE:2}
      pdf-page-dispatch-queue-capacity: ${CHATAGENT_RAG_VDP_PDF_PAGE_DISPATCH_QUEUE_CAPACITY:0}
      pdf-batch-core-pool-size: ${CHATAGENT_RAG_VDP_PDF_BATCH_CORE_POOL_SIZE:1}
      pdf-batch-max-pool-size: ${CHATAGENT_RAG_VDP_PDF_BATCH_MAX_POOL_SIZE:2}
      pdf-batch-queue-capacity: ${CHATAGENT_RAG_VDP_PDF_BATCH_QUEUE_CAPACITY:30}
      pdf-render-dpi: ${CHATAGENT_RAG_VDP_PDF_RENDER_DPI:120}
      mineru:
        enabled: ${CHATAGENT_RAG_VDP_MINERU_ENABLED:true}
        base-url: ${CHATAGENT_RAG_VDP_MINERU_BASE_URL:http://127.0.0.1:8000}
        bearer-token: ${CHATAGENT_RAG_VDP_MINERU_BEARER_TOKEN:}
        version: ${CHATAGENT_RAG_VDP_MINERU_VERSION:v1}
        backend: ${CHATAGENT_RAG_VDP_MINERU_BACKEND:pipeline}
        parse-method: ${CHATAGENT_RAG_VDP_MINERU_PARSE_METHOD:auto}
        table-enable: ${CHATAGENT_RAG_VDP_MINERU_TABLE_ENABLE:true}
        max-pdf-size-mb: ${CHATAGENT_RAG_VDP_MINERU_MAX_PDF_SIZE_MB:50}
        poll-interval-ms: ${CHATAGENT_RAG_VDP_MINERU_POLL_INTERVAL_MS:2000}
        max-poll-attempts: ${CHATAGENT_RAG_VDP_MINERU_MAX_POLL_ATTEMPTS:150}
        submit-timeout-ms: ${CHATAGENT_RAG_VDP_MINERU_SUBMIT_TIMEOUT_MS:30000}
        poll-timeout-ms: ${CHATAGENT_RAG_VDP_MINERU_POLL_TIMEOUT_MS:5000}
      vlm:
        enabled: ${CHATAGENT_RAG_VDP_VLM_ENABLED:true}
        client-id: ${CHATAGENT_RAG_VDP_VLM_CLIENT_ID:glm-4.6}
        model-id: ${CHATAGENT_RAG_VDP_VLM_MODEL_ID:glm-4v-flash}
        prompt-version: ${CHATAGENT_RAG_VDP_VLM_PROMPT_VERSION:v1}
        max-tokens: ${CHATAGENT_RAG_VDP_VLM_MAX_TOKENS:1200}
        temperature: ${CHATAGENT_RAG_VDP_VLM_TEMPERATURE:0.1}
        timeout-ms: ${CHATAGENT_RAG_VDP_VLM_TIMEOUT_MS:5000}
        core-pool-size: ${CHATAGENT_RAG_VDP_CORE_POOL_SIZE:1}
        max-pool-size: ${CHATAGENT_RAG_VDP_MAX_POOL_SIZE:2}
        queue-capacity: ${CHATAGENT_RAG_VDP_QUEUE_CAPACITY:0}
        failure-placeholder: "${CHATAGENT_RAG_VDP_FAILURE_PLACEHOLDER:[图像解析失败]}"
    retrieval:
      document-signals:
        cache-ttl-minutes: ${CHATAGENT_RAG_DOCUMENT_SIGNAL_CACHE_TTL_MINUTES:30}
    ingestion:
      document-enhancer:
        enabled: ${CHATAGENT_RAG_DOCUMENT_ENHANCER_ENABLED:false}
        model-id: ${CHATAGENT_RAG_DOCUMENT_ENHANCER_MODEL:}
        prompt-version: ${CHATAGENT_RAG_DOCUMENT_ENHANCER_PROMPT_VERSION:v1}
        short-doc-char-limit: ${CHATAGENT_RAG_DOCUMENT_ENHANCER_SHORT_DOC_CHAR_LIMIT:12000}
        map-window-max-chars: ${CHATAGENT_RAG_DOCUMENT_ENHANCER_MAP_WINDOW_MAX_CHARS:6000}
        max-keywords: ${CHATAGENT_RAG_DOCUMENT_ENHANCER_MAX_KEYWORDS:10}
        max-questions: ${CHATAGENT_RAG_DOCUMENT_ENHANCER_MAX_QUESTIONS:5}
        max-keyword-chars: ${CHATAGENT_RAG_DOCUMENT_ENHANCER_MAX_KEYWORD_CHARS:80}
        max-question-chars: ${CHATAGENT_RAG_DOCUMENT_ENHANCER_MAX_QUESTION_CHARS:180}
        min-enhanced-length-ratio: ${CHATAGENT_RAG_DOCUMENT_ENHANCER_MIN_LENGTH_RATIO:0.5}
        max-enhanced-length-ratio: ${CHATAGENT_RAG_DOCUMENT_ENHANCER_MAX_LENGTH_RATIO:2.0}
      contextual-enricher:
        enabled: ${CHATAGENT_RAG_CONTEXTUAL_ENRICHER_ENABLED:true}
        model-id: ${CHATAGENT_RAG_CONTEXTUAL_MODEL:}
        max-document-chars: ${CHATAGENT_RAG_CONTEXTUAL_MAX_DOCUMENT_CHARS:12000}
        max-chunks-per-file: ${CHATAGENT_RAG_CONTEXTUAL_MAX_CHUNKS_PER_FILE:12}
        min-chunk-chars: ${CHATAGENT_RAG_CONTEXTUAL_MIN_CHUNK_CHARS:160}
        max-context-chars: ${CHATAGENT_RAG_CONTEXTUAL_MAX_CONTEXT_CHARS:600}
  mq:
    enabled: ${CHATAGENT_MQ_ENABLED:true}
    exchanges:
      chat-direct: ${CHATAGENT_MQ_EXCHANGE_CHAT_DIRECT:chat.direct}
      retry-direct: ${CHATAGENT_MQ_EXCHANGE_RETRY_DIRECT:retry.direct}
      dlx-direct: ${CHATAGENT_MQ_EXCHANGE_DLX_DIRECT:dlx.direct}
    routing-keys:
      agent-run: ${CHATAGENT_MQ_ROUTING_KEY_AGENT_RUN:agent.run}
      ingest-task: ${CHATAGENT_MQ_ROUTING_KEY_INGEST_TASK:ingest.task}
      retry-agent: ${CHATAGENT_MQ_ROUTING_KEY_RETRY_AGENT:retry.agent}
      retry-ingest: ${CHATAGENT_MQ_ROUTING_KEY_RETRY_INGEST:retry.ingest}
      dead-letter: ${CHATAGENT_MQ_ROUTING_KEY_DEAD_LETTER:dead.letter}
    queues:
      chat-agent-dispatch: ${CHATAGENT_MQ_QUEUE_CHAT_AGENT_DISPATCH:chat.agent.dispatch}
      knowledge-ingest-task: ${CHATAGENT_MQ_QUEUE_KNOWLEDGE_INGEST_TASK:knowledge.ingest.task}
      retry-agent10s: ${CHATAGENT_MQ_QUEUE_RETRY_AGENT_10S:retry.agent.10s}
      retry-ingest30s: ${CHATAGENT_MQ_QUEUE_RETRY_INGEST_30S:retry.ingest.30s}
      chat-dlq: ${CHATAGENT_MQ_QUEUE_CHAT_DLQ:chat.dlq}
    retry:
      agent-delay-ms: ${CHATAGENT_MQ_RETRY_AGENT_DELAY_MS:10000}
      ingest-delay-ms: ${CHATAGENT_MQ_RETRY_INGEST_DELAY_MS:30000}
    outbox:
      poll-interval-ms: ${CHATAGENT_MQ_OUTBOX_POLL_INTERVAL_MS:500}
      batch-size: ${CHATAGENT_MQ_OUTBOX_BATCH_SIZE:10}
      max-publish-attempts: ${CHATAGENT_MQ_OUTBOX_MAX_PUBLISH_ATTEMPTS:5}
      publish-retry-delay-ms: ${CHATAGENT_MQ_OUTBOX_PUBLISH_RETRY_DELAY_MS:10000}
      claim-timeout-ms: ${CHATAGENT_MQ_OUTBOX_CLAIM_TIMEOUT_MS:60000}
      confirm-timeout-ms: ${CHATAGENT_MQ_OUTBOX_CONFIRM_TIMEOUT_MS:5000}
      cleanup-interval-ms: ${CHATAGENT_MQ_OUTBOX_CLEANUP_INTERVAL_MS:86400000}
      cleanup-retention-days: ${CHATAGENT_MQ_OUTBOX_CLEANUP_RETENTION_DAYS:7}
      id-namespace: ${CHATAGENT_MQ_OUTBOX_ID_NAMESPACE:a41c8a5f-f0d4-58f6-a4f5-bf4a8ef7ca55}
    consumers:
      agent-prefetch: ${CHATAGENT_MQ_CONSUMER_AGENT_PREFETCH:5}
      agent-concurrency: ${CHATAGENT_MQ_CONSUMER_AGENT_CONCURRENCY:5}
      ingest-prefetch: ${CHATAGENT_MQ_CONSUMER_INGEST_PREFETCH:1}
      ingest-concurrency: ${CHATAGENT_MQ_CONSUMER_INGEST_CONCURRENCY:2}
    locks:
      running-ttl-ms: ${CHATAGENT_MQ_LOCK_RUNNING_TTL_MS:60000}
      session-exec-ttl-ms: ${CHATAGENT_MQ_LOCK_SESSION_EXEC_TTL_MS:120000}
      watchdog-interval-ms: ${CHATAGENT_MQ_LOCK_WATCHDOG_INTERVAL_MS:20000}
      completed-ttl-ms: ${CHATAGENT_MQ_LOCK_COMPLETED_TTL_MS:86400000}
      failed-ttl-ms: ${CHATAGENT_MQ_LOCK_FAILED_TTL_MS:3600000}
      agent-run-policy: ${CHATAGENT_MQ_LOCK_AGENT_RUN_POLICY:FAIL_OPEN}
      ingest-task-policy: ${CHATAGENT_MQ_LOCK_INGEST_TASK_POLICY:FAIL_FAST}
      session-exec-policy: ${CHATAGENT_MQ_LOCK_SESSION_EXEC_POLICY:FAIL_OPEN}
    dispatchers:
      agent-run-enabled: ${CHATAGENT_MQ_DISPATCHER_AGENT_RUN_ENABLED:false}
  session-guard:
    enabled: ${CHATAGENT_SESSION_GUARD_ENABLED:true}
    ttl-ms: ${CHATAGENT_SESSION_GUARD_TTL_MS:120000}
    fail-open: ${CHATAGENT_SESSION_GUARD_FAIL_OPEN:true}

auth:
  jwt:
    issuer: ${CHATAGENT_JWT_ISSUER:chatagent}
    secret: ${CHATAGENT_JWT_SECRET:change-this-to-a-long-random-secret-key-change-this}
    access-ttl-minutes: ${CHATAGENT_JWT_ACCESS_TTL_MINUTES:30}
    refresh-ttl-days: ${CHATAGENT_JWT_REFRESH_TTL_DAYS:7}

logging:
  level:
    com.yulong.chatagent.user: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      group:
        routing:
          include: chatRouting
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        chatagent.llm.routing.latency: true
