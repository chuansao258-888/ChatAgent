spring:
  application:
    name: chatagent
  profiles:
    default: local-gpu
  servlet:
    multipart:
      max-file-size: 64MB
      max-request-size: 64MB
  data:
    redis:
      host: localhost
      port: 6379
      password: ${CHATAGENT_REDIS_PASSWORD:}
      database: 0
  rabbitmq:
    host: localhost
    port: 5672
    username: ${CHATAGENT_RABBITMQ_USERNAME:guest}
    password: ${CHATAGENT_RABBITMQ_PASSWORD:guest}
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      # Keep unroutable messages observable for the future outbox/confirm flow.
      mandatory: true
    listener:
      simple:
        default-requeue-rejected: false

  datasource:
    url: ${CHATAGENT_DB_URL:jdbc:postgresql://localhost:5432/chatagent}
    username: ${CHATAGENT_DB_USERNAME:app}
    password: ${CHATAGENT_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    postgresql:
      transactional-lock: false
  ai:
    deepseek:
      api-key: ${CHATAGENT_DEEPSEEK_API_KEY:}
      base-url: ${CHATAGENT_DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: deepseek-v4-flash
          temperature: 0.2
          top-p: 0.8
          max-tokens: 2048
    anthropic:
      api-key: ${CHATAGENT_ZAI_CODING_API_KEY:}
      base-url: ${CHATAGENT_ZAI_CODING_ANTHROPIC_BASE_URL:https://api.z.ai/api/anthropic}
      chat:
        options:
          model: "glm-5.2"
          temperature: 0.35
          top-p: 0.85
          max-tokens: 8192
    zhipuai:
      api-key: ${CHATAGENT_ZAI_CODING_API_KEY:}
      base-url: ${CHATAGENT_ZAI_CODING_ZHIPU_BASE_URL:https://api.z.ai/api/coding/paas}
      chat:
        options:
          model: glm-4.6v-flash
          temperature: 0.35
          top-p: 0.85
          max-tokens: 4096

mybatis:
  type-aliases-package: com.yulong.chatagent.support.persistence.entity
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.yulong.chatagent.support.persistence.typehandler

document:
  storage:
    base-path: ./data/documents

rag:
  embedding:
    base-url: http://127.0.0.1:11434
    model: bge-m3
  retrieval:
    top-k: 3
    candidate-k: 12
    rrf-k: 60
    reranker:
      provider: bge-http
      model-id: BAAI/bge-reranker-v2-m3
      max-candidates: 8
      max-chunk-chars: 900
      max-connections: 10
      base-url: http://127.0.0.1:7997
      path: /rerank
      ready-path: /ready
      api-key: ${CHATAGENT_RAG_RERANKER_API_KEY:}
      connect-timeout-ms: 300
      response-timeout-ms: 1800
      read-timeout-ms: 1800
      write-timeout-ms: 1000
      pending-acquire-timeout-ms: 200
      ready-probe-timeout-ms: 200
      retry-connect-errors: 1
      enable-confidence-filter: true
      score-threshold: 0.08
      failure-threshold: 5
      failure-rate-threshold-percent: 50
      minimum-request-volume: 10
      open-state-ms: 30000
      half-open-probe-count: 1
  vector-store:
    provider: milvus

milvus:
  enabled: true
  bm25-enabled: false
  host: localhost
  port: 19530
  database: default
  collection: chat_file_chunk
  username: ${CHATAGENT_MILVUS_USERNAME:}
  password: ${CHATAGENT_MILVUS_PASSWORD:}
  metric-type: COSINE
  index-type: AUTOINDEX
  consistency-level: BOUNDED
  dimension: 1024
  knowledge-base:
    collection: chat_knowledge_chunk
  user-memory:
    collection: chat_user_memory

chat:
  routing:
    default-model: "glm-5.2"
    deep-thinking-model: "glm-5.2"
    agent-primary-model: "glm-5.2"
    agent-fallback-model: deepseek-v4-flash
    first-packet-timeout-seconds: 60
    decision-total-timeout-seconds: 180
    stream-total-timeout-seconds: 300
    http-connect-timeout-seconds: 10
    http-read-timeout-seconds: 65
    health:
      failure-threshold: 3
      open-duration-ms: 300000
      half-open-flight-timeout-ms: 120000
    observability:
      open-circuit-warning-ratio: 0.5
      down-when-no-routable-candidates: true
      out-of-service-when-all-routable-candidates-open: true
      warn-on-orphan-overrides: true
    candidates:
      - id: "glm-5.2"
        spring-client-key: "glm-5.2"
        priority: 5
        enabled: true
        supports-thinking: true
        thinking-strategy: ANTHROPIC_THINKING
      - id: deepseek-v4-flash
        spring-client-key: deepseek-v4-flash
        priority: 10
        enabled: true
        supports-thinking: true
        thinking-strategy: MODEL_OVERRIDE
        thinking-model: deepseek-v4-pro

chatagent:
  id:
    snowflake:
      worker-id: 1
  intent:
    tool-scope-mode: AGENT_DEFAULT_WITH_INTENT_NARROWING
    classifier-model: deepseek-v4-flash
    rewrite-model: deepseek-v4-flash
    decision-policy:
      mode: ${CHATAGENT_INTENT_DECISION_MODE:enforce}
      profile-version: ${CHATAGENT_INTENT_POLICY_PROFILE_VERSION:v1}
      recent-context-turns: ${CHATAGENT_INTENT_RECENT_CONTEXT_TURNS:4}
      recent-context-max-chars: ${CHATAGENT_INTENT_RECENT_CONTEXT_MAX_CHARS:4000}
      max-clarification-attempts: ${CHATAGENT_INTENT_MAX_CLARIFICATION_ATTEMPTS:2}
  agent:
    session-run:
      local-serialization-enabled: ${CHATAGENT_AGENT_LOCAL_SESSION_SERIALIZATION_ENABLED:true}
      local-acquire-timeout-ms: ${CHATAGENT_AGENT_LOCAL_SESSION_ACQUIRE_TIMEOUT_MS:120000}
      redis-failure-policy: ${CHATAGENT_AGENT_SESSION_RUN_REDIS_FAILURE_POLICY:local-fallback}
    turn-contract:
      enabled: ${CHATAGENT_AGENT_TURN_CONTRACT_ENABLED:true}
      retrieval-enforcement: ${CHATAGENT_AGENT_RETRIEVAL_ENFORCEMENT:enforce}
      emit-debug-metadata: ${CHATAGENT_AGENT_TURN_CONTRACT_DEBUG_METADATA:false}
      intent-kb-inheritance-enabled: ${CHATAGENT_AGENT_INTENT_KB_INHERITANCE_ENABLED:false}
    runtime:
      default-mode: ${CHATAGENT_AGENT_RUNTIME_DEFAULT_MODE:REACT}
      mode-selection: ${CHATAGENT_AGENT_RUNTIME_MODE_SELECTION:USER_EXPLICIT}
      react:
        max-steps: ${CHATAGENT_AGENT_RUNTIME_REACT_MAX_STEPS:20}
        max-tool-calls-per-step: ${CHATAGENT_AGENT_RUNTIME_REACT_MAX_TOOL_CALLS_PER_STEP:4}
        max-total-tool-proposals: ${CHATAGENT_AGENT_RUNTIME_REACT_MAX_TOTAL_TOOL_PROPOSALS:40}
        max-total-tool-calls: ${CHATAGENT_AGENT_RUNTIME_REACT_MAX_TOTAL_TOOL_CALLS:20}
        max-total-llm-calls: ${CHATAGENT_AGENT_RUNTIME_REACT_MAX_TOTAL_LLM_CALLS:24}
        max-elapsed-ms: ${CHATAGENT_AGENT_RUNTIME_REACT_MAX_ELAPSED_MS:300000}
      deepthink:
        enabled: ${CHATAGENT_AGENT_RUNTIME_DEEPTHINK_ENABLED:true}
        max-plan-items: ${CHATAGENT_AGENT_RUNTIME_DEEPTHINK_MAX_PLAN_ITEMS:5}
        max-react-steps-per-plan-item: ${CHATAGENT_AGENT_RUNTIME_DEEPTHINK_MAX_REACT_STEPS_PER_PLAN_ITEM:3}
        max-reflection-rounds: ${CHATAGENT_AGENT_RUNTIME_DEEPTHINK_MAX_REFLECTION_ROUNDS:2}
        max-verification-rounds: ${CHATAGENT_AGENT_RUNTIME_DEEPTHINK_MAX_VERIFICATION_ROUNDS:2}
        max-total-tool-calls: ${CHATAGENT_AGENT_RUNTIME_DEEPTHINK_MAX_TOTAL_TOOL_CALLS:20}
        max-total-llm-calls: ${CHATAGENT_AGENT_RUNTIME_DEEPTHINK_MAX_TOTAL_LLM_CALLS:30}
        max-total-tool-proposals: ${CHATAGENT_AGENT_RUNTIME_DEEPTHINK_MAX_TOTAL_TOOL_PROPOSALS:30}
        max-elapsed-ms: ${CHATAGENT_AGENT_RUNTIME_DEEPTHINK_MAX_ELAPSED_MS:300000}
        planning-model-deep-thinking: ${CHATAGENT_AGENT_RUNTIME_DEEPTHINK_PLANNING_MODEL_DEEP_THINKING:true}
        execution-model-deep-thinking: ${CHATAGENT_AGENT_RUNTIME_DEEPTHINK_EXECUTION_MODEL_DEEP_THINKING:false}
        reflection-model-deep-thinking: ${CHATAGENT_AGENT_RUNTIME_DEEPTHINK_REFLECTION_MODEL_DEEP_THINKING:true}
        verification-model-deep-thinking: ${CHATAGENT_AGENT_RUNTIME_DEEPTHINK_VERIFICATION_MODEL_DEEP_THINKING:true}
  memory:
    l1-window-turns: ${CHATAGENT_MEMORY_L1_WINDOW_TURNS:48}
    l1-token-budget: ${CHATAGENT_MEMORY_L1_TOKEN_BUDGET:256000}
    summary-model: deepseek-v4-flash
    summary-max-chars: 500
    l3:
      enabled: true
      extractor-model: deepseek-v4-flash
      recall-top-k: 3
    compaction:
      v2:
        enabled: true
        trigger-unsummarized-turns: ${CHATAGENT_MEMORY_COMPACTION_V2_TRIGGER_UNSUMMARIZED_TURNS:30}
        compaction-batch-turns: ${CHATAGENT_MEMORY_COMPACTION_V2_COMPACTION_BATCH_TURNS:20}
        min-pending-tokens: ${CHATAGENT_MEMORY_COMPACTION_V2_MIN_PENDING_TOKENS:24000}
        l1-token-warning-ratio: ${CHATAGENT_MEMORY_COMPACTION_V2_L1_TOKEN_WARNING_RATIO:0.92}
        segment-max-chars: ${CHATAGENT_MEMORY_COMPACTION_V2_SEGMENT_MAX_CHARS:6000}
        synopsis-max-chars: ${CHATAGENT_MEMORY_COMPACTION_V2_SYNOPSIS_MAX_CHARS:16000}
        runtime-max-segments: 3
        max-retries: 2
        max-consecutive-failures: 3
        failure-backoff-seconds: 300
        tool-result-max-chars: ${CHATAGENT_MEMORY_COMPACTION_V2_TOOL_RESULT_MAX_CHARS:12000}
        tool-result-head-chars: 800
        tool-result-tail-chars: 800
  rag:
    vdp:
      cache:
        enabled: true
        session-ttl-minutes: 30
        session-max-size: 512
        knowledge-ttl-minutes: 1440
      routing:
        disabled-engines: []
        knowledge-batch-preferred: true
        preferred-page-image-engine: ""
        preferred-batch-engine: mineru
      char-density-threshold: 150
      short-text-fast-track-threshold: 80
      whitespace-alignment-line-threshold: 2
      pdf-page-max-in-flight: 2
      pdf-page-timeout-ms: 5000
      knowledge-document-timeout-ms: 300000
      pdf-page-dispatch-core-pool-size: 2
      pdf-page-dispatch-max-pool-size: 2
      pdf-page-dispatch-queue-capacity: 0
      pdf-batch-core-pool-size: 1
      pdf-batch-max-pool-size: 2
      pdf-batch-queue-capacity: 30
      pdf-render-dpi: 120
      mineru:
        enabled: true
        base-url: http://127.0.0.1:8000
        bearer-token: ${CHATAGENT_RAG_VDP_MINERU_BEARER_TOKEN:}
        version: v1
        backend: pipeline
        parse-method: auto
        table-enable: true
        max-pdf-size-mb: 50
        poll-interval-ms: 2000
        max-poll-attempts: 150
        submit-timeout-ms: 30000
        poll-timeout-ms: 5000
      vlm:
        enabled: true
        client-id: glm-4.6v-flash
        model-id: glm-4.6v-flash
        prompt-version: v2
        max-tokens: 1200
        temperature: 0.1
        timeout-ms: 30000
        core-pool-size: 1
        max-pool-size: 2
        queue-capacity: 0
        failure-placeholder: ""
    retrieval:
      document-signals:
        cache-ttl-minutes: 30
    ingestion:
      document-enhancer:
        enabled: true
        model-id: ""
        prompt-version: v2
        short-doc-char-limit: 12000
        map-window-max-chars: 6000
        max-keywords: 10
        max-questions: 5
        max-keyword-chars: 80
        max-question-chars: 180
        min-enhanced-length-ratio: 0.5
        max-enhanced-length-ratio: 2.0
      contextual-enricher:
        enabled: true
        model-id: ""
        max-chunks-per-file: 12
        min-chunk-chars: 160
        max-context-chars: 600
  mq:
    enabled: true
    exchanges:
      chat-direct: chat.direct
      retry-direct: retry.direct
      dlx-direct: dlx.direct
    routing-keys:
      agent-run: agent.run
      ingest-task: ingest.task
      retry-agent: retry.agent
      retry-ingest: retry.ingest
      dead-letter: dead.letter
    queues:
      chat-agent-dispatch: chat.agent.dispatch
      knowledge-ingest-task: knowledge.ingest.task
      retry-agent10s: retry.agent.10s
      retry-ingest30s: retry.ingest.30s
      chat-dlq: chat.dlq
    retry:
      agent-delay-ms: 10000
      ingest-delay-ms: 30000
    outbox:
      poll-interval-ms: 500
      batch-size: 10
      max-publish-attempts: 5
      publish-retry-delay-ms: 10000
      claim-timeout-ms: 60000
      confirm-timeout-ms: 5000
      cleanup-interval-ms: 86400000
      cleanup-retention-days: 7
      id-namespace: a41c8a5f-f0d4-58f6-a4f5-bf4a8ef7ca55
    consumers:
      agent-prefetch: 5
      agent-concurrency: 5
      ingest-prefetch: 1
      ingest-concurrency: 2
    locks:
      running-ttl-ms: 60000
      session-exec-ttl-ms: 120000
      watchdog-interval-ms: 20000
      completed-ttl-ms: 86400000
      failed-ttl-ms: 3600000
      agent-run-policy: FAIL_OPEN
      ingest-task-policy: FAIL_FAST
    dispatchers:
      agent-run-enabled: true
  session-guard:
    enabled: true
    ttl-ms: 120000
    fail-open: true
  web-search:
    enabled: false
    searxng-base-url: http://localhost:8888
    connect-timeout-ms: 2000
    response-timeout-ms: 8000
    default-max-results: 3
    max-results: 3
    max-result-snippet-chars: 240
    max-query-chars: 300
    safe-search: 1
  mcp:
    enabled: true
    crypto:
      key: ${CHATAGENT_MCP_CIPHER_KEY:}
      key-version: v1
    transport:
      client-name: ChatAgent
      client-version: phase-1b
      preferred-http-protocol-version: "2025-06-18"
      preferred-sse-protocol-version: "2024-11-05"
      connect-timeout-ms: 2000
      response-timeout-ms: 10000
      read-timeout-ms: 10000
      write-timeout-ms: 10000
      request-timeout-ms: 15000
      max-in-memory-size-bytes: 131072
      sse-connect-timeout-ms: 5000
      sse-max-reconnects: 5
      sse-initial-backoff-ms: 1000
      sse-max-backoff-ms: 30000
    runtime:
      rate-limit-enabled: true
      rate-limit-requests-per-second: 10
      rate-limit-burst-capacity: 10
      circuit-breaker-enabled: true
      circuit-breaker-sliding-window-size: 10
      circuit-breaker-failure-threshold: 5
      circuit-breaker-failure-rate-threshold-percent: 50
      circuit-breaker-minimum-request-volume: 10
      circuit-breaker-open-state-ms: 30000
      circuit-breaker-half-open-probe-count: 3
      circuit-breaker-slow-call-duration-ms: 10000
      circuit-breaker-slow-call-rate-threshold-percent: 80
    schema-drift:
      enabled: true
      fixed-delay-ms: 600000
    rollout:
      mode: ALL
      allowed-agent-ids: []
  rate-limit:
    entry:
      enabled: true
      requests-per-second: 2
      burst-capacity: 5
      redis-failure-policy: LOCAL_BUCKET
    agent-run:
      enabled: true
      max-concurrency: 3
      permit-ttl-ms: 180000
      permit-renew-interval-ms: 20000
      wait-timeout-ms: 120000
      wait-status-interval-ms: 5000
      redis-failure-policy: LOCAL_CAP
      local-capacity-on-redis-failure: 1

auth:
  jwt:
    issuer: chatagent
    secret: ${CHATAGENT_JWT_SECRET:}
    access-ttl-minutes: 30
    refresh-ttl-days: 7

logging:
  level:
    com.yulong.chatagent.user: INFO
