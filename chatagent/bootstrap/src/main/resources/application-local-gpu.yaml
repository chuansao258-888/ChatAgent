spring:
  config:
    activate:
      on-profile: local-gpu

rag:
  embedding:
    base-url: http://127.0.0.1:11434
    model: bge-m3
  retrieval:
    reranker:
      provider: bge-http
      model-id: BAAI/bge-reranker-v2-m3
      base-url: http://127.0.0.1:7997
      path: /rerank
      ready-path: /ready

chatagent:
  rag:
    vdp:
      routing:
        knowledge-batch-preferred: true
        preferred-batch-engine: mineru
      mineru:
        enabled: true
        base-url: http://127.0.0.1:8000
        bearer-token: ${CHATAGENT_RAG_VDP_MINERU_BEARER_TOKEN:}
