services:
  postgres:
    image: postgres:16-alpine
    container_name: chatagent-loadtest-postgres
    environment:
      POSTGRES_DB: chatagent
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app123
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d chatagent"]
      interval: 3s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: chatagent-loadtest-redis
    command: ["redis-server", "--requirepass", "123456"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: chatagent-loadtest-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
