groups:
  - name: chatagent-routing
    rules:
      - alert: ChatAgentRoutingFallbackFailuresHigh
        expr: |
          sum(rate(chatagent_llm_routing_attempts_total{outcome!="success",fallback_available="true"}[5m]))
          /
          clamp_min(sum(rate(chatagent_llm_routing_attempts_total[5m])), 0.001)
          > 0.2
        for: 10m
        labels:
          severity: warning
          subsystem: chat-routing
          service: chatagent
        annotations:
          summary: "ChatAgent routing fallback failure ratio is high"
          description: "More than 20% of LLM routing attempts failed while fallback was available during the last 10 minutes."
          runbook_url: "docs/observability/CHAT_ROUTING_MONITORING_RUNBOOK.md"
          health_endpoint: "/actuator/health/chatRouting"
          admin_state_endpoint: "/api/admin/chat-routing/state"

      - alert: ChatAgentFirstPacketFailuresHigh
        expr: |
          sum(rate(chatagent_llm_routing_attempts_total{mode="stream_first_packet",outcome!="success"}[5m]))
          /
          clamp_min(sum(rate(chatagent_llm_routing_attempts_total{mode="stream_first_packet"}[5m])), 0.001)
          > 0.15
        for: 10m
        labels:
          severity: warning
          subsystem: chat-routing
          service: chatagent
        annotations:
          summary: "ChatAgent first-packet probe failure ratio is high"
          description: "More than 15% of stream first-packet probes failed during the last 10 minutes."
          runbook_url: "docs/observability/CHAT_ROUTING_MONITORING_RUNBOOK.md"
          health_endpoint: "/actuator/health/chatRouting"
          admin_state_endpoint: "/api/admin/chat-routing/state"

      - alert: ChatAgentModelCircuitOpened
        expr: increase(chatagent_llm_circuit_events_total{event=~"opened|reopened"}[10m]) > 0
        for: 0m
        labels:
          severity: warning
          subsystem: chat-routing
          service: chatagent
        annotations:
          summary: "ChatAgent model circuit opened"
          description: "At least one model circuit opened or reopened in the last 10 minutes. Check /actuator/health/chatRouting and /api/admin/chat-routing/state."
          runbook_url: "docs/observability/CHAT_ROUTING_MONITORING_RUNBOOK.md"
          health_endpoint: "/actuator/health/chatRouting"
          admin_state_endpoint: "/api/admin/chat-routing/state"

      - alert: ChatAgentAllRoutingCandidatesSkipped
        expr: increase(chatagent_llm_circuit_decisions_total{decision=~"skipped_sync|skipped_stream|denied_open|denied_half_open"}[5m]) > 10
        for: 5m
        labels:
          severity: critical
          subsystem: chat-routing
          service: chatagent
        annotations:
          summary: "ChatAgent routing candidates are being skipped by circuits"
          description: "Circuit decisions skipped or denied more than 10 calls in 5 minutes. User traffic may be unable to reach a model."
          runbook_url: "docs/observability/CHAT_ROUTING_MONITORING_RUNBOOK.md"
          health_endpoint: "/actuator/health/chatRouting"
          admin_state_endpoint: "/api/admin/chat-routing/state"
