route:
  group_by: ["alertname", "service", "env"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  receiver: chatagent-routing-observer
  routes:
    - matchers:
        - subsystem="chat-routing"
        - severity="critical"
      receiver: chatagent-routing-primary
    - matchers:
        - subsystem="chat-routing"
        - severity="warning"
      receiver: chatagent-routing-observer

receivers:
  - name: chatagent-routing-primary
    webhook_configs:
      - url: ${CHATAGENT_ALERTMANAGER_PRIMARY_WEBHOOK_URL}
        send_resolved: true
  - name: chatagent-routing-observer
    webhook_configs:
      - url: ${CHATAGENT_ALERTMANAGER_OBSERVER_WEBHOOK_URL}
        send_resolved: true
