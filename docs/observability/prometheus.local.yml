global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/chat-routing-alerts.prometheus.yml

scrape_configs:
  - job_name: chatagent
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080
        labels:
          service: chatagent
          env: local
